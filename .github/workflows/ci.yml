name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    # Prisma 7 reads DATABASE_URL from prisma.config.ts during `prisma generate` (npm postinstall).
    # CI has no .env — use a placeholder URL; generate does not connect to the database.
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci_placeholder?schema=public
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
