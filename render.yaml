# Optional Render Blueprint — import this repo in Render -> Blueprints -> New Blueprint Instance
# You must still set secret env vars in the Render dashboard (JWT, Square, FRONTEND_ORIGIN, etc.).
# See docs/DEPLOYMENT.md and backend/.env.example

services:
  - type: web
    name: by-celeste-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    # Render builds can run with NODE_ENV=production, which may omit devDependencies.
    # Backend TypeScript build needs @types/* and prisma (devDependencies), so include them explicitly.
    buildCommand: npm install --include=dev && npm run build && npx prisma generate
    # Run migrations + idempotent seeds on boot, so free-tier users can deploy without shell access.
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
